<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}AI SecOps{% endblock %} — Phishing Triage</title>
  <meta name="description" content="AI-powered SOC phishing triage dashboard using Ollama qwen3:8b"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="/static/css/main.css?v=3" rel="stylesheet"/>
  {% block head %}{% endblock %}
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar" class="d-flex flex-column">
  <div class="sidebar-brand">
    <i class="bi bi-shield-shaded me-2"></i>
    <span>SecOps<span class="brand-accent">AI</span></span>
  </div>
  <hr class="sidebar-divider"/>
  <ul class="nav flex-column gap-1 flex-grow-1">
    <li class="nav-item">
      <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">
        <i class="bi bi-speedometer2"></i> Dashboard
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if '/alerts' in request.url.path %}active{% endif %}" href="/alerts/">
        <i class="bi bi-exclamation-triangle"></i> Alert Queue
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if '/processing' in request.url.path %}active{% endif %}" href="/processing/">
        <i class="bi bi-cpu"></i> Processing
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link {% if '/reports' in request.url.path %}active{% endif %}" href="/reports/">
        <i class="bi bi-file-earmark-text"></i> Reports
      </a>
    </li>
    <li class="nav-item mt-auto">
      <a class="nav-link" href="/docs" target="_blank">
        <i class="bi bi-code-slash"></i> API Docs
      </a>
    </li>
  </ul>
  <div class="sidebar-footer">
    <div class="text-center text-muted small mt-2">
      AI SecOps &copy; 2026
    </div>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div id="main-content">
  <!-- TOP NAV -->
  <header class="topbar d-flex align-items-center justify-content-between px-4">
    <div class="d-flex align-items-center gap-3">
      <button class="btn btn-sm btn-outline-secondary d-lg-none" onclick="document.getElementById('sidebar').classList.toggle('open')">
        <i class="bi bi-list"></i>
      </button>
      <h6 class="mb-0 fw-semibold">{% block page_title %}Dashboard{% endblock %}</h6>
    </div>
    <div class="d-flex align-items-center gap-3">
      <select id="modelSelect" name="model" class="form-select form-select-sm bg-dark text-light border-secondary d-none d-md-inline-block w-auto" hx-preserve>
        <option value="qwen" selected>Ollama (qwen3)</option>
        <option value="gemini">Gemini Pro</option>
      </select>
      <input type="file" id="fileUpload" style="display:none" accept=".json" onchange="uploadDataset(this)"/>
      <button class="btn btn-sm btn-outline-info" onclick="document.getElementById('fileUpload').click()">
        <i class="bi bi-cloud-upload me-1"></i> Upload
      </button>
      <button class="btn btn-sm btn-outline-warning" data-bs-toggle="modal" data-bs-target="#pasteModal">
        <i class="bi bi-clipboard me-1"></i> Paste
      </button>
      <button class="btn btn-sm btn-outline-light" data-bs-toggle="offcanvas" data-bs-target="#terminalOffcanvas" aria-controls="terminalOffcanvas">
        <i class="bi bi-terminal me-1"></i> Terminal
      </button>
      <button class="btn btn-sm btn-primary" hx-post="/api/analyze" hx-swap="none" hx-include="#modelSelect"
              onclick="this.innerHTML='<i class=\'bi bi-arrow-repeat spin me-1\'></i> Running…'; this.disabled=true; showToast('Triage Started', 'Processing alerts in the background. Dashboard will auto-update.', 'primary'); setTimeout(()=>{this.innerHTML='<i class=\'bi bi-play-fill me-1\'></i> Run Triage';this.disabled=false},10000)">
        <i class="bi bi-play-fill me-1"></i> Run Triage
      </button>
    </div>
  </header>

  <!-- PAGE BODY -->
  <main class="p-4">
    {% block content %}{% endblock %}
  </main>
</div>

<!-- PASTE MODAL -->
<div class="modal fade" id="pasteModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content text-bg-dark">
      <div class="modal-header border-secondary">
        <h5 class="modal-title"><i class="bi bi-clipboard me-2"></i>Quick Paste</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <ul class="nav nav-tabs mb-3 border-secondary" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#pasteJson" type="button" role="tab">JSON Payload</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#pasteText" type="button" role="tab">Plain Email Text</button>
          </li>
        </ul>
        <div class="tab-content">
          <div class="tab-pane fade show active" id="pasteJson" role="tabpanel">
            <textarea id="jsonContent" class="form-control bg-dark border-secondary text-light font-monospace" rows="10" placeholder='[{"alert_id": "...", ...}]'></textarea>
          </div>
          <div class="tab-pane fade" id="pasteText" role="tabpanel">
            <textarea id="textContent" class="form-control bg-dark border-secondary text-light font-monospace" rows="10" placeholder="Paste raw email body here..."></textarea>
          </div>
        </div>
      </div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="submitPaste()">Analyze</button>
      </div>
    </div>
  </div>
</div>

<!-- TERMINAL OFFCANVAS -->
<div class="offcanvas offcanvas-bottom text-bg-dark" tabindex="-1" id="terminalOffcanvas" aria-labelledby="terminalOffcanvasLabel" style="height: 40vh; border-top: 1px solid #333;">
  <div class="offcanvas-header border-bottom border-secondary py-2">
    <h6 class="offcanvas-title font-monospace text-success" id="terminalOffcanvasLabel"><i class="bi bi-terminal me-2"></i>Analysis Monitor</h6>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body font-monospace p-0 bg-black position-relative" style="font-size: 0.85rem; overflow-y: auto;">
    <div id="terminal-output" class="p-3 text-success" 
         hx-get="/api/logs" 
         hx-trigger="every 1s" 
         hx-swap="innerHTML"
         style="white-space: pre-wrap; line-height: 1.5;">
    </div>
  </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1055;">
  <div id="globalToast" class="toast align-items-center text-bg-dark border-0" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body">
        <strong class="me-auto" id="toastTitle">Notification</strong><br/>
        <span id="toastMessage">Message</span>
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script src="/static/js/main.js?v=4"></script>
<script>
  function showToast(title, message, colorClass) {
    const toastEl = document.getElementById('globalToast');
    document.getElementById('toastTitle').textContent = title;
    document.getElementById('toastMessage').textContent = message;
    toastEl.className = `toast align-items-center text-bg-${colorClass} border-0`;
    const t = new bootstrap.Toast(toastEl, { delay: 4000 });
    t.show();
  }

  function uploadDataset(input) {
    if(!input.files || input.files.length === 0) return;
    const file = input.files[0];
    const formData = new FormData();
    formData.append("file", file);
    formData.append("model", document.getElementById("modelSelect").value);
    showToast("Uploading...", "Uploading dataset and starting triage...", "info");
    fetch("/api/upload", { method: "POST", body: formData })
      .then(res => res.json())
      .then(data => {
        if(data.status === 'success') {
          showToast("Upload Success", data.message, "success");
        } else {
          showToast("Upload Error", data.message || "Failed", "danger");
        }
        input.value = ""; // clear input
      }).catch(err => {
        showToast("Error", "Network error during upload", "danger");
        input.value = "";
      });
  }

  function submitPaste() {
    const jsonTab = document.getElementById('pasteJson');
    let pasteType, content;
    if (jsonTab.classList.contains('active')) {
      pasteType = 'json';
      content = document.getElementById('jsonContent').value;
    } else {
      pasteType = 'text';
      content = document.getElementById('textContent').value;
    }

    if (!content.trim()) {
      showToast("Error", "Content cannot be empty", "warning");
      return;
    }

    showToast("Submitting...", "Queuing pasted content for triage...", "info");
    const modalEl = document.getElementById('pasteModal');
    const modal = bootstrap.Modal.getInstance(modalEl);
    if (modal) modal.hide();

    fetch("/api/paste", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ type: pasteType, content: content, model: document.getElementById('modelSelect').value })
    })
    .then(res => res.json())
    .then(data => {
      if(data.status === 'success') {
        showToast("Success", data.message, "success");
        document.getElementById('jsonContent').value = "";
        document.getElementById('textContent').value = "";
      } else {
        showToast("Error", data.message || "Failed", "danger");
      }
    }).catch(err => {
      showToast("Error", "Network error during paste submission", "danger");
    });
  }
</script>
{% block scripts %}{% endblock %}
</body>
</html>
